<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PCTO — Accesso</title>
<link rel="stylesheet" href="/static/style.css">
<style>
.login-box {
  width: 100%;
  max-width: 380px;
}
.login-title {
  font-family: 'Playfair Display', serif;
  font-size: 48px;
  font-weight: 600;
  letter-spacing: -1px;
  margin-bottom: 8px;
  line-height: 1;
}
.login-sub {
  font-size: 14px;
  color: var(--gray);
  margin-bottom: 36px;
}
.input-icon-wrap {
  position: relative;
  margin-bottom: 14px;
}
.input-icon-wrap svg {
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  color: #aaa;
  pointer-events: none;
}
.input-icon-wrap input {
  padding-left: 40px;
}
.role-selector {
  display: flex;
  gap: 8px;
  margin-bottom: 20px;
}
.role-btn {
  flex: 1;
  padding: 9px;
  border: 1.5px solid #ccc;
  border-radius: var(--radius-sm);
  background: var(--white);
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  font-weight: 500;
  transition: all 0.15s;
  text-align: center;
  color: var(--gray);
}
.role-btn.active {
  background: var(--pink);
  border-color: var(--black);
  color: var(--black);
  box-shadow: var(--shadow-sm);
}
.invia-btn {
  width: 100%;
  justify-content: center;
  font-size: 16px;
  padding: 12px;
  margin-top: 6px;
}
.cloud {
  position: absolute;
  background: white;
  border-radius: 50px;
}
.cloud::before, .cloud::after {
  content: '';
  position: absolute;
  background: white;
  border-radius: 50%;
}
</style>
</head>
<body>
<div class="split">
  <div class="split-left">
    <svg class="landscape" viewBox="0 0 600 700" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#ADE8F4"/>
          <stop offset="100%" stop-color="#CAF0F8"/>
        </linearGradient>
        <linearGradient id="grass1" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#52b788"/>
          <stop offset="100%" stop-color="#40916c"/>
        </linearGradient>
        <linearGradient id="grass2" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#2d6a4f"/>
          <stop offset="100%" stop-color="#1b4332"/>
        </linearGradient>
        <linearGradient id="grass3" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#1b4332"/>
          <stop offset="100%" stop-color="#081c15"/>
        </linearGradient>
      </defs>
      <!-- Sky -->
      <rect width="600" height="700" fill="url(#sky)"/>
      <!-- Clouds -->
      <ellipse cx="120" cy="120" rx="90" ry="45" fill="white" opacity="0.95"/>
      <ellipse cx="80" cy="130" rx="55" ry="35" fill="white" opacity="0.95"/>
      <ellipse cx="185" cy="125" rx="55" ry="35" fill="white" opacity="0.95"/>
      <ellipse cx="400" cy="80" rx="70" ry="35" fill="white" opacity="0.8"/>
      <ellipse cx="360" cy="90" rx="45" ry="28" fill="white" opacity="0.8"/>
      <ellipse cx="455" cy="85" rx="45" ry="28" fill="white" opacity="0.8"/>
      <!-- Far hills -->
      <ellipse cx="300" cy="500" rx="500" ry="200" fill="url(#grass1)"/>
      <!-- Mid hill -->
      <ellipse cx="150" cy="600" rx="350" ry="180" fill="url(#grass2)"/>
      <ellipse cx="500" cy="620" rx="300" ry="160" fill="url(#grass2)"/>
      <!-- Front -->
      <rect x="0" y="580" width="600" height="200" fill="url(#grass3)"/>
      <ellipse cx="300" cy="580" rx="400" ry="80" fill="url(#grass3)"/>
    </svg>
  </div>

  <div class="split-right">
    <div class="login-box">
      <div class="login-title">ACCESSO</div>
      <div class="login-sub">Gestione PCTO — inserisci le tue credenziali</div>

      <div class="form-group">
        <label>Ruolo</label>
        <div class="role-selector">
          <button class="role-btn active" onclick="setRole('studente', this)">🎓 Studente</button>
          <button class="role-btn" onclick="setRole('scuola', this)">🏫 Scuola</button>
          <button class="role-btn" onclick="setRole('admin', this)">⚙️ Admin</button>
        </div>
      </div>

      <div class="input-icon-wrap">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
        <input type="email" id="email" placeholder="Email">
      </div>

      <div class="input-icon-wrap">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        <input type="password" id="password" placeholder="Password">
      </div>

      <button class="btn invia-btn" onclick="login()">INVIA →</button>

      <div id="msg" style="margin-top:14px;"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let selectedRole = 'studente';

function setRole(role, btn) {
  selectedRole = role;
  document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

function showToast(msg, type = '') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + type;
  setTimeout(() => t.className = 'toast', 2800);
}

async function login() {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  if (!email || !password) { showToast('Inserisci email e password', 'error'); return; }

  try {
    const res = await fetch(`/login?email=${encodeURIComponent(email)}&password=${encodeURIComponent(password)}`, { method: 'POST' });
    const data = await res.json();
    if (data.status === 'ok') {
      localStorage.setItem('pcto_email', email);
      localStorage.setItem('pcto_role', selectedRole);
      showToast('Accesso effettuato!', 'success');
      setTimeout(() => {
        if (selectedRole === 'studente') window.location.href = '/studente';
        else if (selectedRole === 'scuola') window.location.href = '/scuola';
        else window.location.href = '/admin';
      }, 800);
    }
  } catch(e) {
    showToast('Errore di connessione al server', 'error');
  }
}

document.addEventListener('keydown', e => { if (e.key === 'Enter') login(); });

// Auto-fill from stored session
const storedEmail = localStorage.getItem('pcto_email');
if (storedEmail) document.getElementById('email').value = storedEmail;
</script>
</body>
</html>
